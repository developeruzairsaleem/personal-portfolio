<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream paper background -->
  <rect width="40" height="40" rx="6" fill="#efe6cf"/>
  <!-- Hair-thin warm border -->
  <rect x="0.5" y="0.5" width="39" height="39" rx="5.5"
        stroke="#1c1610" stroke-opacity="0.18" stroke-width="1"/>
  <!-- Red wax-stamp circle (tilted, slightly inset) -->
  <circle cx="20" cy="20" r="13.5"
          stroke="#a8362b" stroke-width="2.4" fill="none"
          transform="rotate(-6 20 20)"/>
  <!-- Italic serif U inside the stamp -->
  <text x="20" y="27"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-style="italic"
        font-weight="400"
        fill="#a8362b"
        text-anchor="middle">U</text>
</svg>
